hero:
  eyebrow: "$ npm install @virto/sdk"
  title_pre: "Build Web3 apps"
  title_accent: "without the complexity"
  paragraph: Ship decentralized features using a TypeScript API you already know. VirtoSDK handles blockchain, identity, and payments so you can focus on your product.
  cta: Get Started
  cta_link: /docs

  code: |
    <span class="keyword">import</span> { createClient } <span class="keyword">from</span> <span class="string">'@virto/sdk'</span>

    <span class="keyword">const</span> virto = <span class="func">createClient</span>({
      network: <span class="string">'kreivo'</span>,
    })

    <span class="comment">// Create a community with governance</span>
    <span class="keyword">const</span> community = <span class="keyword">await</span> virto.communities.<span class="func">create</span>({
      name: <span class="string">'My DAO'</span>,
      membership: <span class="string">'open'</span>,
    })

features:
  title: Why developers choose Virto
  subtitle: A familiar developer experience for unfamiliar infrastructure.
  cards:
    - icon: "> _"
      title: Familiar API
      description: TypeScript-first SDK with async/await patterns. If you know fetch, you know Virto.
    - icon: "{ }"
      title: Modular by Design
      description: Use only what you need — payments, identity, governance, or all of them together.
    - icon: "0x"
      title: Kreivo-Powered
      description: Built on Kreivo, a blockchain optimized for community economies and real-world use cases.
    - icon: "#!"
      title: No Wallet Required
      description: Onboard users with passkeys and social login. No extensions, no seed phrases.

how_it_works:
  title: How it works
  steps:
    - number: "01"
      title: Install
      description: Add the SDK to your project with npm or yarn. Zero native dependencies.
    - number: "02"
      title: Connect
      description: Initialize a client pointing to Kreivo. Auth, payments, and governance are built in.
    - number: "03"
      title: Ship
      description: Deploy your app. Virto handles the decentralized infrastructure behind the scenes.

kreivo_teaser:
  title: Powered by Kreivo
  description: Kreivo is a purpose-built blockchain for community economies. Real-time block production, on-chain governance, and native multi-currency support.
