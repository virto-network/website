        title: Web3 Foundation
  cta:
    title: Ready to launch?
    description: Set up your organization on Kreivo and start onboarding members today.
    button: Get started
    button_link: "#tiers"

# SDK page — Developer-focused
sdk:
  hero:
    eyebrow: "$ npm install @virto/sdk"
    title_pre: "Build Web3 apps"
    title_accent: "without the complexity"
    paragraph: Ship decentralized features using a TypeScript API you already know. VirtoSDK handles blockchain, identity, and payments so you can focus on your product.
    cta: Read the Docs
    cta_link: /docs
    code: |
      <span class="keyword">import</span> { createClient } <span class="keyword">from</span> <span class="string">'@virto/sdk'</span>

      <span class="keyword">const</span> virto = <span class="func">createClient</span>({
        network: <span class="string">'kreivo'</span>,
      })

      <span class="comment">// Create a community with governance</span>
      <span class="keyword">const</span> community = <span class="keyword">await</span> virto.communities.<span class="func">create</span>({
        name: <span class="string">'My DAO'</span>,
        membership: <span class="string">'open'</span>,
      })
  features:
    title: Why developers choose Virto
    subtitle: A familiar developer experience for unfamiliar infrastructure.
    cards:
      - icon: "> _"
        title: Familiar API
        description: TypeScript-first SDK with async/await patterns. If you know fetch, you know Virto.
      - icon: "{ }"
        title: Modular by Design
        description: Use only what you need — payments, identity, governance, or all of them together.
      - icon: "0x"
        title: Kreivo-Powered
        description: Built on Kreivo, a blockchain optimized for community economies and real-world use cases.
      - icon: "#!"
        title: No Wallet Required
        description: Onboard users with passkeys and social login. No extensions, no seed phrases.
  how_it_works:
    title: How it works
    steps:
      - number: "01"
        title: Install
        description: Add the SDK to your project with npm or yarn. Zero native dependencies.
      - number: "02"
        title: Connect
        description: Initialize a client pointing to Kreivo. Auth, payments, and governance are built in.
      - number: "03"
        title: Ship
        description: Deploy your app. Virto handles the decentralized infrastructure behind the scenes.
  cta:
    title: Ready to build?
    description: Start building decentralized applications in minutes, not months.
    button: Read the Docs
    button_link: /docs

# Kreivo page
kreivo:
  hero:
    title_pre: "Meet"
    title_accent: "Kreivo"
    subtitle: "Creativity, in Kusama."
    description: Kreivo is a community-governed blockchain on Kusama, built for community economies. Organizations that join Kreivo collectively govern the chain — bigger subscriptions get more voting power, but balanced so no single entity dominates.
    matrix_label: Join the conversation
    matrix_link: https://matrix.to/#/#kreivo:virto.community
  features:
    title: What makes Kreivo different
    list:
      - title: "0.5s blocks \xB7 12 cores"
        description: The fastest parachain in the ecosystem. 0.5-second block times with 12 execution cores delivering unmatched throughput for real-time applications.
      - title: No wallets needed
        description: Users authenticate with passkeys, ZK proofs, and social login. No browser extensions, no seed phrases.
      - title: Feeless transactions
        description: Members of subscribed organizations transact without gas fees. The subscription covers it.
      - title: Reversible payments
        description: Escrow-based payment system with built-in dispute resolution. Safe for real commerce.
      - title: Org governance
        description: Advanced governance with multiple tracks for independent business units within a single organization.
      - title: Marketplace primitives
        description: Native tokenization, product listings, and shopping carts for building decentralized marketplaces.
      - title: Community-governed chain
        description: Kreivo is governed by its member organizations, not token whales. Voting power scales with subscription, not holdings.
  ecosystem:
    title: Building on Kreivo
    description: Teams and projects using Kreivo to power real-world community economies.
    projects:
      - name: Bloque
        description: A platform for community-powered local commerce. Payments, memberships, and governance for neighborhood businesses.
        link: https://www.bloque.app/
      - name: Virto Marketplace
        description: Decentralized marketplace infrastructure with on-chain escrow, multi-currency payments, and community-driven dispute resolution.
        link: https://github.com/virto-network
  cta:
    title: Explore the Kreivo network
    description: Live blocks, communities, governance, and network stats — all in one place.
    button: Open Explorer
    button_link: /kreivo/explorer

