kreivo:
  hero:
    title_pre: "Meet"
    title_accent: "Kreivo"
    description: A purpose-built blockchain for community economies. Kreivo provides the decentralized infrastructure that powers VirtoSDK applications.
  architecture:
    title: Architecture
    cards:
      - title: Parachain Runtime
        description: Kreivo runs as a Polkadot parachain, inheriting shared security while maintaining sovereignty over its own state and logic.
      - title: Community Pallets
        description: Native on-chain modules for memberships, governance, and multi-currency treasuries. Built for real organizations.
      - title: VOS (Virto Operating System)
        description: A decentralized execution layer that runs backend logic as smart services. Think microservices, but trustless.
  dashboard:
    title: Network at a Glance
    metrics:
      - id: block-height
        value: "1,842,567"
        label: Block Height
      - id: communities
        value: "128"
        label: Active Communities
      - id: transactions
        value: "4.2M"
        label: Total Transactions
      - id: validators
        value: "7"
        label: Collators

