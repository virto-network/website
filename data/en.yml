        label: Community
        price: "$10"
        per_seat: "$1/seat"
        memberships: "Up to 10"
        gas: "5K tx/mo"
        governance: "1 business unit"
        voting: "1x"
        description: For small collectives, clubs, and early-stage DAOs.
        plus:
          price: "$18"
          gas: "20K tx/mo"
      - name: M
        label: Organization
        price: "$80"
        per_seat: "$0.80/seat"
        memberships: "Up to 100"
        gas: "50K tx/mo"
        governance: "5 business units"
        voting: "3x"
        description: For growing orgs with active governance.
        featured: true
        plus:
          price: "$130"
          gas: "200K tx/mo"
      - name: L
        label: Business
        price: "$700"
        per_seat: "$0.70/seat"
        memberships: "Up to 1,000"
        gas: "500K tx/mo"
        governance: "10 business units"
        voting: "5x"
        description: For businesses onboarding customers at scale.
        plus:
          price: "$1,100"
          gas: "2M tx/mo"
      - name: XL
        label: Enterprise
        price: "$0.50"
