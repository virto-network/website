<footer id="footer" class="dark-olive-bg">
	<a href="#" class="logo">
		<svg width="90" height="79" fill="none" viewBox="0 0 90 79" xmlns="http://www.w3.org/2000/svg">
			<path d="m69.38 39.5-11.97 20.7h-25.14l-11.97-20.7 11.97-20.78h25.14zm-5.709-39.5h-37.59c-2.855 0-5.471 1.507-6.899 3.966l-18.24 31.57c-1.427 2.459-1.427 5.473 0 7.932l18.24 31.57c1.427 2.459 4.044 3.966 6.899 3.966h37.59c2.855 0 5.472-1.507 6.899-3.966l18.24-31.57c1.427-2.459 1.427-5.473 0-7.932l-18.32-31.57c-1.427-2.459-4.044-3.966-6.82-3.966z" fill="#decff1"/>
		</svg>
	</a>
	<nav>
		<ul class="nav-links bolder">
			{% for item in config.extra.footer %}
				{% if lang == "es" %}{% set link_text = item.link_es %}{% else %}{% set link_text = item.link_en %}{% endif %}
				<li><a href="{{ item.route }}">{{ link_text }}</a></li>
			{% endfor %}
		</ul>
	</nav>
	<a id="scroll-up" class="scroll-up-link lightest-lavender-text center-arrow">
		{% if lang == "es" %}Volver arriba{% else %}Back to Top{% endif %}
		<figure class="link-arrow">
			<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
		</figure>
	</a>
	<a class="github-link" href="https://github.com/virto-network">github.com/virto-network</a>
</footer>
<script>
	document.querySelector('#scroll-up').addEventListener('click', () => {
		window.scrollTo({ top: 0, behavior: "smooth" });
	});
</script>
