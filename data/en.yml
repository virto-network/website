    title: Ready to go in 3 steps
    subtitle: From zero to a fully operational on-chain organization.
    steps:
      - number: "01"
        title: Pick a tier
        description: Choose a plan that fits your organization's size and needs.
      - number: "02"
        title: Set up your org
        description: Configure memberships, governance rules, and payment methods through a simple dashboard.
      - number: "03"
        title: Launch
        description: Your organization is live. Members join, vote, and transact — all on-chain.
  tiers:
