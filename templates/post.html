<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="description" content="{{ config.description }}">
	<meta name="theme-color" content="#8d52cb">
	<title>{{ page.title }} - {{ config.title }}</title>
	<link rel="stylesheet" href="/css/variables.css">
	<link rel="stylesheet" href="/css/common.css">
	<link rel="stylesheet" href="/css/layout.css">
	<style>
	#post { background-color: var(--clr-white); }
	main { padding: 2rem 1rem; box-sizing: border-box; }
	header h1, header p { text-align: center; }
	header h1 { margin-top: 8vh; }
	header p { font-style: italic; color: var(--clr-olive-darker); margin-top: 1em; }
	header time::after { content: '⬣'; margin: 0 1em; color: var(--clr-lavender-lighter); }
	header picture {
		align-items: center; color: white; display: flex;
		justify-content: center; margin: 3rem 0; border-radius: 8px;
		width: 100%; height: 40vmax;
		max-height: calc(var(--max-width) * 0.6); overflow: hidden;
	}
	header img { object-fit: cover; width: 100%; height: 100%; }
	#post article { font-size: 1.1em; line-height: 1.8em; max-width: 800px; margin: auto; }
	#post article>p, article>h3 { margin: calc(1.5rem + 2vmin) 0; }
	article strong { color: var(--clr-olive-darker); }
	article a { color: var(--clr-lavender-darker); }
	article ul { list-style: "⬡   "; }
	blockquote { background: var(--clr-green-lighter); border-radius: 5px; margin: 2rem 0; padding: 1rem; }
	blockquote p { margin: 0; }
	code { vertical-align: bottom; }
	li { padding: .5em; }
	img { width: 100%; border-radius: 5px; }
	</style>
	<script defer data-domain="virto.network" src="https://plausible.io/js/script.js"></script>
</head>
<body>
	{% include "nav.html" %}
	<main class="max" id="post">
		<header>
			<h1>{{ page.title }}</h1>
			<p>
				<time datetime="{{ page.date }}">{{ page.date | date(format="%b %d, %Y") }}</time>
				by {{ page.extra.author }}
			</p>
			<picture>
				<img src="/img/blog/{{ page.slug }}.jpg" alt="Post cover">
			</picture>
		</header>
		<article>{{ page.content | safe }}</article>
	</main>
	{% include "footer.html" %}
</body>
</html>
